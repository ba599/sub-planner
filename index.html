<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이벤트 플래너</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 20px auto; padding: 0 16px; }
    footer { margin-top: 50vh; padding: 12px 0; text-align: center; color: #888; font-size: 0.85em; }
    footer a { color: inherit; }
    h1 { font-size: 1.4em; display: flex; justify-content: space-between; align-items: center; }
    h1 .toolbar button { margin-left: 6px; font-size: 0.7em; }
    details { border: 1px solid #8884; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; }
    details > summary { font-weight: bold; cursor: pointer; width: fit-content; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #8884; padding: 4px 8px; text-align: center; }
    th { background: #8881; }
    input[type="text"], input[type="number"] { width: 100%; box-sizing: border-box; padding: 2px 4px; font: inherit; }
    input[readonly] { background: #8881; color: #888; }
    .btn-row { margin-top: 8px; }
    .btn-del { color: #c33; background: none; border: none; cursor: pointer; font-size: 1.1em; }
    .group-disabled { opacity: 0.4; }
    .result-ok { color: #2a7; font-size: 1.6em; font-weight: bold; text-align: center; margin: 12px 0; }
    .group-toggle-row { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 8px; }
    .group-toggle-row label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
    .stages-table tr.group-disabled { opacity: 0.35; }
    .result-msg { padding: 12px; text-align: center; color: #888; }
    .result-err { padding: 12px; text-align: center; color: #c33; background: #c331; border-radius: 6px; }
    .owned-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .owned-row label { display: inline-flex; gap: 4px; align-items: center; }
    .owned-row input { width: 80px; }
    .shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
    .shop-cell { border: 1px solid #8884; border-radius: 4px; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .shop-cell-row { display: flex; gap: 4px; align-items: center; }
    .shop-cell-row input { flex: 1; min-width: 0; }
    .shop-cell-label { font-size: 0.85em; color: #888; min-width: 28px; }
    .shop-cell-empty { border-style: dashed; opacity: 0.3; }
    .shop-cell-add { align-items: stretch; justify-content: center; }
    .shop-cell-add button { width: 100%; height: 100%; padding: 8px; cursor: pointer; }
    .stage-rec-title { font-weight: bold; margin-top: 12px; }
    .stage-rec-table tbody td:nth-child(1),
    .stage-rec-table tbody td:nth-child(3) { background: rgba(42,170,119,0.18); }
    #json-view, #preset-view { display: none; }
    #sec-shops { position: relative; }
    .preset-toolbar {
      position: absolute;
      top: 6px;
      right: 10px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .preset-toolbar button {
      font-size: 0.8em;
      cursor: pointer;
    }
    .info-icon {
      position: relative;
      cursor: help;
      color: #888;
      font-size: 1.1em;
      user-select: none;
      font-weight: normal;
    }
    .info-tip {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      width: 250px;
      padding: 8px 10px;
      background: Canvas;
      color: CanvasText;
      border: 1px solid #8884;
      border-radius: 6px;
      box-shadow: 0 2px 8px #0003;
      font-size: 0.85em;
      line-height: 1.5;
      white-space: normal;
      text-align: left;
      z-index: 20;
    }
    .info-icon:hover .info-tip { display: block; }
    .shop-cell .item-name-row { position: relative; }
    .autocomplete-dropdown {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      z-index: 10;
      background: Canvas;
      border: 1px solid #8884;
      max-height: 174px;
      overflow-y: auto;
      box-shadow: 0 2px 6px #0002;
    }
    .autocomplete-item {
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .autocomplete-item.selected,
    .autocomplete-item:hover { background: #8883; }
    #json-view textarea,
    #preset-view textarea { width: 100%; height: 400px; font: 12px/1.4 monospace; }
    .scroll-x { overflow-x: auto; }
    .mobile-only { display: none; }
    #btn-export, #btn-import { font-size: 1em; padding: 1px 6px; line-height: 1; }
    @media (max-width: 600px) {
      .desktop-only { display: none !important; }
      .mobile-only { display: initial; }
      .owned-row { flex-direction: column; align-items: flex-start; gap: 6px; }
      .stages-table th:nth-child(2),
      .stages-table td:nth-child(2) { display: none; }
      .stage-rec-table th:nth-child(n+4),
      .stage-rec-table td:nth-child(n+4) { display: none; }
      .scroll-x { scrollbar-width: none; }
      .scroll-x::-webkit-scrollbar { display: none; }
      .scroll-x table { white-space: nowrap; }
      .scroll-x table th:first-child,
      .scroll-x table td:first-child { width: 90px; min-width: 90px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
      .shop-grid { grid-template-columns: 1fr; }
      .shop-cell-empty { display: none; }
      .shop-grid .shop-cell:nth-child(8n+1),
      .shop-grid .shop-cell:nth-child(8n+2),
      .shop-grid .shop-cell:nth-child(8n+3),
      .shop-grid .shop-cell:nth-child(8n+4) { background: rgba(128,128,128,0.10); }
    }
  </style>
</head>
<body>
  <h1>
    이벤트 플래너
    <span class="toolbar">
      <button id="btn-json">JSON 보기</button>
      <button id="btn-export" title="내보내기" aria-label="내보내기">💾</button>
      <button id="btn-import" title="불러오기" aria-label="불러오기">📂</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </span>
  </h1>

  <div id="main-view">
    <details id="sec-result" open>
      <summary>1. 보유량 &amp; 결과</summary>
      <div id="owned-container"></div>
      <div id="result-container"></div>
    </details>

    <details id="sec-currencies" open>
      <summary>2. 재화</summary>
      <div id="currencies-container"></div>
    </details>

    <details id="sec-stages" open>
      <summary>3. 스테이지 (12개 고정)</summary>
      <div id="stages-container"></div>
    </details>

    <details id="sec-shops" open>
      <summary>4. 상점</summary>
      <div class="preset-toolbar">
        <button id="btn-preset-edit">프리셋 수정</button>
        <span class="info-icon">ⓘ<span class="info-tip">자동완성 프리셋은 실제 인게임 상점 정보와 다를 수 있습니다.<br>특히 개수 부분은 이벤트기간 별로 달라지기 쉬우니 반드시 이중으로 체크해주세요.</span></span>
      </div>
      <div id="shops-container"></div>
    </details>
  </div>

  <div id="json-view">
    <textarea id="json-textarea"></textarea>
    <div class="btn-row">
      <button id="btn-json-apply">적용</button>
      <button id="btn-json-cancel">취소</button>
    </div>
  </div>

  <div id="preset-view">
    <textarea id="preset-textarea"></textarea>
    <div class="btn-row">
      <button id="btn-preset-apply">적용</button>
      <button id="btn-preset-cancel">취소</button>
      <button id="btn-preset-reset">프리셋 초기화</button>
    </div>
  </div>

  <footer>
    Hangul search powered by <a href="https://github.com/toss/es-hangul" target="_blank" rel="noopener">es-hangul</a>
  </footer>

    'ㅊ': 'ㅊ', 'ㅋ': 'ㅋ', 'ㅌ': 'ㅌ', 'ㅍ': 'ㅍ', 'ㅎ': 'ㅎ',
  };

  const DISASSEMBLED_VOWELS_BY_VOWEL = {
    'ㅏ': 'ㅏ', 'ㅐ': 'ㅐ', 'ㅑ': 'ㅑ', 'ㅒ': 'ㅒ',
    'ㅓ': 'ㅓ', 'ㅔ': 'ㅔ', 'ㅕ': 'ㅕ', 'ㅖ': 'ㅖ',
    'ㅗ': 'ㅗ', 'ㅘ': 'ㅗㅏ', 'ㅙ': 'ㅗㅐ', 'ㅚ': 'ㅗㅣ', 'ㅛ': 'ㅛ',
    'ㅜ': 'ㅜ', 'ㅝ': 'ㅜㅓ', 'ㅞ': 'ㅜㅔ', 'ㅟ': 'ㅜㅣ', 'ㅠ': 'ㅠ',
    'ㅡ': 'ㅡ', 'ㅢ': 'ㅡㅣ', 'ㅣ': 'ㅣ',
  };

  const CHOSEONGS = [
    'ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ',
    'ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ',
  ];

  const JUNGSEONGS = Object.values(DISASSEMBLED_VOWELS_BY_VOWEL);

  const JONGSEONGS = [
    '', 'ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ',
    'ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ',
    'ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ',
    'ㅋ','ㅌ','ㅍ','ㅎ',
  ].map(c => DISASSEMBLED_CONSONANTS_BY_CONSONANT[c]);

  const JASO_HANGUL_NFD = {
    START_CHOSEONG: _JASO_HANGUL_NFD[0],
    END_CHOSEONG:   _JASO_HANGUL_NFD[3],
  };

  // ---- Helpers (file-scoped) ----

  function hasProperty(obj, key) {
    return Object.prototype.hasOwnProperty.call(obj, key);
  }

  function disassembleCompleteCharacter(letter) {
    const charCode = letter.charCodeAt(0);
    if (charCode < COMPLETE_HANGUL_START_CHARCODE || charCode > COMPLETE_HANGUL_END_CHARCODE) {
      return undefined;
    }
    const hangulCode = charCode - COMPLETE_HANGUL_START_CHARCODE;
    const jongseongIndex = hangulCode % NUMBER_OF_JONGSEONG;
    const jungseongIndex = ((hangulCode - jongseongIndex) / NUMBER_OF_JONGSEONG) % NUMBER_OF_JUNGSEONG;
    const choseongIndex  = Math.floor((hangulCode - jongseongIndex) / NUMBER_OF_JONGSEONG / NUMBER_OF_JUNGSEONG);
    return {
      choseong:  CHOSEONGS[choseongIndex],
      jungseong: JUNGSEONGS[jungseongIndex],
      jongseong: JONGSEONGS[jongseongIndex],
    };
  }

  function disassembleToGroups(str) {
    const result = [];
    for (const letter of str) {
      const dc = disassembleCompleteCharacter(letter);
      if (dc != null) {
        result.push([...dc.choseong, ...dc.jungseong, ...dc.jongseong]);
        continue;
      }
      if (hasProperty(DISASSEMBLED_CONSONANTS_BY_CONSONANT, letter)) {
        result.push([...DISASSEMBLED_CONSONANTS_BY_CONSONANT[letter]]);
        continue;
      }
      if (hasProperty(DISASSEMBLED_VOWELS_BY_VOWEL, letter)) {
        result.push([...DISASSEMBLED_VOWELS_BY_VOWEL[letter]]);

      }
      result.push([letter]);
    }
    return result;
  }

  // ---- Public: disassemble ----

  function disassemble(str) {
    return disassembleToGroups(str).reduce(
      (acc, group) => acc + group.join(''),
      ''
    );
  }

  // ---- Public: getChoseong ----

  const EXTRACT_CHOSEONG_REGEX = new RegExp(
    '[^\\u' + JASO_HANGUL_NFD.START_CHOSEONG.toString(16) +
    '-\\u' + JASO_HANGUL_NFD.END_CHOSEONG.toString(16) +
    'ㄱ-ㅎ\\s]+',
    'ug'
  );
  const CHOOSE_NFD_CHOSEONG_REGEX = new RegExp(
    '[\\u' + JASO_HANGUL_NFD.START_CHOSEONG.toString(16) +
    '-\\u' + JASO_HANGUL_NFD.END_CHOSEONG.toString(16) + ']',
    'g'
  );

  function getChoseong(word) {
    return word
      .normalize('NFD')
      .replace(EXTRACT_CHOSEONG_REGEX, '')
      .replace(CHOOSE_NFD_CHOSEONG_REGEX, $0 => CHOSEONGS[$0.charCodeAt(0) - 0x1100]);
  }

  // ---- Export ----
  global.disassemble = disassemble;
  global.getChoseong = getChoseong;
})(typeof window !== 'undefined' ? window : globalThis);

  <script>
// Event Planner — 순수 로직 함수들. 브라우저·Node 모두에서 require/로드 가능.

const STAGE_AP = [10, 10, 10, 10, 15, 15, 15, 15, 20, 20, 20, 20];

function applyBonus(raw, bonus) {
  return Math.ceil(+(raw * (100 + bonus) / 100).toFixed(5));
}

function parseSumExpr(text) {
  if (text == null) return 0;
  const parts = String(text).split('+').map(p => p.trim()).filter(p => p !== '');
  if (parts.length === 0) return 0;
  let total = 0;
  for (const p of parts) {
    const n = Number(p);
    if (!Number.isFinite(n) || n < 0) return 0;
    total += n;
  }
  return total;
}

function allocateCurrencyId(currencies) {
  const used = new Set(currencies.map(c => c.id));
  for (let i = 1; ; i++) {
    if (!used.has(i)) return i;
  }
}

function normalizeCurrencyIds(state) {
  const used = new Set();
  state.currencies.forEach(c => {
    if (typeof c.id !== 'number' || !Number.isInteger(c.id) || c.id < 1 || used.has(c.id)) {
      const temp = [];
      used.forEach(id => temp.push({ id }));
      c.id = allocateCurrencyId(temp);
    }
    used.add(c.id);
  });

  state.shopItems = state.shopItems.filter(it => used.has(it.currencyId));

  state.stages.forEach(stage => {
    Object.keys(stage.drops).forEach(key => {
      if (!used.has(Number(key))) delete stage.drops[key];
    });
  });

  Object.keys(state.owned).forEach(key => {
    if (!used.has(Number(key))) delete state.owned[key];
  });
}

function defaultState() {
  return {
    currencies: [],
    stages: Array.from({ length: 12 }, () => ({ drops: {} })),
    shopItems: [],
    owned: {},
    groupsEnabled: [true, true, true],
    presetItems: [],
  };
}

const TIE_EPSILON = 1e-6;

// LP-only: we deliberately do not flag variables as integer. Branch-and-cut on
// this structure (12 vars × 4 constraints) runs effectively forever in the pure-
// JS solver once >3 currency constraints are active; LP relaxation + ceil() in
// the caller finishes in <1 ms and overshoots optimal AP by <0.1%.
// TIE_EPSILON is group-level (not per stage) so LP ties resolve toward the later
// group. Per-stage perturbation would force the integer solver to exhaust its
// branch tree, which is what caused v1.1.1's freeze.
function buildModel(state) {
  const variables = {};
  state.stages.forEach((stage, i) => {
    const group = Math.floor(i / 4);
    if (!state.groupsEnabled[group]) return;

    const v = { AP: STAGE_AP[i] - TIE_EPSILON * group };
    state.currencies.forEach(c => {
      const raw = stage.drops[c.id] ?? 0;
      v['c' + c.id] = applyBonus(raw, c.bonus);
    });
    variables['s' + (i + 1)] = v;
  });

  const constraints = {};
  state.currencies.forEach(c => {
    const need = state.shopItems
      .filter(it => it.currencyId === c.id)
      .reduce((sum, it) => sum + (it.price || 0) * (it.buyCount || 0), 0);
    const remaining = need - (state.owned[c.id] ?? 0);
    if (remaining > 0) constraints['c' + c.id] = { min: remaining };
  });

  return { optimize: 'AP', opType: 'min', variables, constraints };
}

function computeBalance(state, solverResult) {
  const result = {};
  state.currencies.forEach(c => {
    const owned = state.owned[c.id] ?? 0;
    const needed = state.shopItems
      .filter(it => it.currencyId === c.id)
      .reduce((sum, it) => sum + (it.price || 0) * (it.buyCount || 0), 0);
    let gained = 0;
    state.stages.forEach((stage, i) => {
      const group = Math.floor(i / 4);
      if (!state.groupsEnabled[group]) return;
      const runs = solverResult['s' + (i + 1)] ?? 0;
      if (!runs) return;
      const perRun = applyBonus(stage.drops[c.id] ?? 0, c.bonus);
      gained += perRun * runs;
    });
    result[c.id] = { owned, gained, needed, surplus: owned + gained - needed };
  });
  return result;
}

function hasMinimumData(state) {
  const hasCurrency = state.currencies.length > 0;
  const hasGroup = state.groupsEnabled.some(g => g);
  const hasItem = state.shopItems.some(it =>
    typeof it.currencyId === 'number' && (it.price || 0) > 0 && (it.buyCount || 0) > 0
  );
  return hasCurrency && hasGroup && hasItem;
}

function matchPresetItems(query, presetItems) {
  // 공백 무시: "반기술"으로 "일반 기술노트"가 매칭되도록 양쪽 모두 공백 제거 후 비교
  const q = (query || '').replace(/\s+/g, '');
  if (!q) return presetItems.slice();
  const qDis = disassemble(q);
  const qCho = getChoseong(q);
  return presetItems.filter(p => {
    const name = p.name.replace(/\s+/g, '');
    const nameDis = disassemble(name);
    if (nameDis.includes(qDis)) return true;
    // qCho는 query에 한글이 없을 때 ''가 되는데, ''.includes('')는 항상 true라서 모든 아이템이 매칭돼버림. 가드 필수.
    if (qCho) {
      const nameCho = getChoseong(name);
      if (nameCho.includes(qCho)) return true;
    }
    return false;
  });
}

function validateState(s) {
  if (!s || typeof s !== 'object' || Array.isArray(s)) return 'state must be an object';

  if (!Array.isArray(s.currencies)) return 'currencies must be an array';
  for (const c of s.currencies) {
    if (!c || typeof c !== 'object') return 'currency item must be object';
    if (typeof c.name !== 'string') return 'currency.name must be string';
    if (typeof c.bonus !== 'number') return 'currency.bonus must be number';
  }

  if (!Array.isArray(s.stages) || s.stages.length !== 12) return 'stages must have length 12';
  for (const st of s.stages) {
    if (!st || typeof st !== 'object') return 'stage must be object';
    if (!st.drops || typeof st.drops !== 'object' || Array.isArray(st.drops))
      return 'stage.drops must be object';
  }

  if (!Array.isArray(s.shopItems)) return 'shopItems must be an array';
  for (const it of s.shopItems) {
    if (!it || typeof it !== 'object') return 'shopItem must be object';
    if (typeof it.currencyId !== 'number') return 'shopItem.currencyId must be number';
    if (typeof it.name !== 'string') return 'shopItem.name must be string';
    if (typeof it.price !== 'number') return 'shopItem.price must be number';
    if (typeof it.buyCount !== 'number') return 'shopItem.buyCount must be number';
  }

  if (!s.owned || typeof s.owned !== 'object' || Array.isArray(s.owned))
    return 'owned must be object';

  if (!Array.isArray(s.groupsEnabled) || s.groupsEnabled.length !== 3)
    return 'groupsEnabled must have length 3';
  for (const g of s.groupsEnabled) {
    if (typeof g !== 'boolean') return 'groupsEnabled entries must be boolean';
  }

  if (!Array.isArray(s.presetItems)) return 'presetItems must be an array';
  for (const it of s.presetItems) {
    if (!it || typeof it !== 'object') return 'presetItem must be object';
    if (typeof it.name !== 'string') return 'presetItem.name must be string';
    if (typeof it.price !== 'number') return 'presetItem.price must be number';
    if (typeof it.buyCount !== 'number') return 'presetItem.buyCount must be number';
  }

  return null;  // valid
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { STAGE_AP, applyBonus, parseSumExpr, defaultState, buildModel, computeBalance, hasMinimumData, validateState, matchPresetItems, allocateCurrencyId, normalizeCurrencyIds };
}

    s.presetItems = cloneDefaultPresetItems();
    return s;

  try {
    const parsed = JSON.parse(raw);

  row2.appendChild(makeNumInput(it.buyCount, v => { it.buyCount = v; afterValueEdit(); }));
  cell.appendChild(row2);

  const row3 = document.createElement('div');
  row3.className = 'shop-cell-row';
  const lbl3 = document.createElement('span');
  lbl3.className = 'shop-cell-label';
  lbl3.textContent = '가격';
  row3.appendChild(lbl3);
  row3.appendChild(makeNumInput(it.price, v => { it.price = v; afterValueEdit(); }));
  cell.appendChild(row3);

  return cell;
}

function makeItemNameRow(it, idx) {
  const row = document.createElement('div');
  row.className = 'shop-cell-row item-name-row';

  const input = makeItemNameInput(it, idx);
  row.appendChild(input);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-del';
  delBtn.tabIndex = -1;
  delBtn.textContent = '×';
  delBtn.title = '삭제';
  delBtn.addEventListener('click', () => {
    state.shopItems.splice(idx, 1);
    afterEdit();
  });
  row.appendChild(delBtn);

  return row;
}

function makeItemNameInput(it, idx) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'item-name-input';
  input.value = it.name ?? '';
  input.placeholder = '보고서, 선물 etc...';
  input.dataset.shopIdx = String(idx);

  input.addEventListener('focus', () => openAutocomplete(input, it, idx));
  input.addEventListener('input', () => updateAutocomplete(input.value));
  input.addEventListener('keydown', e => handleAutocompleteKey(e, input));
  input.addEventListener('focusout', () => {
    // mousedown preventDefault가 걸린 경우(드롭다운 클릭)에는 이 경로가 실행되어도
    // selectPresetItem이 afterEdit으로 덮어씀. 일반 blur는 여기서 커밋.
    setTimeout(() => {
      // afterEdit의 render()가 인풋을 detach했다면 이 핸들러는 오래된 input.value로
      // 방금 갱신된 state를 덮어써버림. isConnected로 감지하고 바일아웃.
      if (!input.isConnected) return;
      if (document.activeElement !== input) {
        closeAutocomplete();
        if (it.name !== input.value) {
          it.name = input.value;
          afterValueEdit();
        }
      }
    }, 0);
  });

  return input;
}

function openAutocomplete(input, shopItem, shopItemIdx) {
  closeAutocomplete();

  const row = input.parentElement;
  const dropdown = document.createElement('div');
  dropdown.className = 'autocomplete-dropdown';
  row.appendChild(dropdown);

  activeAutocomplete = {
    input,
    dropdown,
    row,
    shopItemIdx,
    shopItem,
    results: [],
    selectedIdx: 0,
  };
  updateAutocomplete(input.value);
}

function updateAutocomplete(query) {
  if (!activeAutocomplete) return;
  const results = matchPresetItems(query, state.presetItems);
  activeAutocomplete.results = results;
  activeAutocomplete.selectedIdx = 0;
  renderAutocomplete();
}

function renderAutocomplete() {
  const a = activeAutocomplete;
  if (!a) return;
  a.dropdown.innerHTML = '';
  if (a.results.length === 0) {
    a.dropdown.style.display = 'none';
    return;
  }
  a.dropdown.style.display = '';
  a.results.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'autocomplete-item' + (i === a.selectedIdx ? ' selected' : '');
    el.textContent = p.name;
    el.addEventListener('mousedown', e => {
      e.preventDefault();  // focusout 방지
    });
    el.addEventListener('click', () => {
      selectPresetItem(a.shopItemIdx, p);
    });
    a.dropdown.appendChild(el);
  });
  scrollSelectedIntoView();
}

function scrollSelectedIntoView() {
  const a = activeAutocomplete;
  if (!a) return;
  const el = a.dropdown.children[a.selectedIdx];
  if (!el) return;
  const itemH = el.offsetHeight;
  const top = el.offsetTop;
  const bottom = top + itemH;
  const viewH = a.dropdown.clientHeight;
  const viewTop = a.dropdown.scrollTop;
  const viewBottom = viewTop + viewH;
  // 선택 항목 위·아래로 1칸씩 여유가 보이도록 스크롤
  if (top - itemH < viewTop) {
    a.dropdown.scrollTop = Math.max(0, top - itemH);
  } else if (bottom + itemH > viewBottom) {
    a.dropdown.scrollTop = bottom + itemH - viewH;
  }
}

function handleAutocompleteKey(e, input) {
  const a = activeAutocomplete;
  if (!a) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (a.results.length === 0) return;
    a.selectedIdx = Math.min(a.selectedIdx + 1, a.results.length - 1);
    renderAutocomplete();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (a.results.length === 0) return;
    a.selectedIdx = Math.max(a.selectedIdx - 1, 0);
    renderAutocomplete();
  } else if (e.key === 'Enter') {
    if (a.results.length === 0) return;
    e.preventDefault();
    const preset = a.results[a.selectedIdx];
    selectPresetItem(a.shopItemIdx, preset);
  } else if (e.key === 'Escape') {
    closeAutocomplete();
  }
}

function closeAutocomplete() {
  if (!activeAutocomplete) return;
  if (activeAutocomplete.dropdown.parentElement) {
    activeAutocomplete.dropdown.parentElement.removeChild(activeAutocomplete.dropdown);
  }
  activeAutocomplete = null;
}

function selectPresetItem(shopItemIdx, preset) {
  const it = state.shopItems[shopItemIdx];
  if (!it) return;
  it.name = preset.name;
  it.price = preset.price;
  it.buyCount = preset.buyCount;
  const currencyId = it.currencyId;
  closeAutocomplete();
  afterEdit();
  focusNextShopItemNameIn(currencyId, shopItemIdx);
}

function focusNextCurrencyName(current) {
  const inputs = Array.from(
    document.querySelectorAll('#currencies-container tbody tr > td:first-child input')
  );
  const idx = inputs.indexOf(current);
  if (idx < 0) { current.blur(); return; }
  const next = inputs[idx + 1];
  if (next) next.focus();
  else current.blur();
}

function focusNextShopItemNameIn(currencyId, currentIdx) {
  const nextIdx = state.shopItems.findIndex(
    (s, i) => i > currentIdx && s.currencyId === currencyId
  );
  if (nextIdx === -1) return;
  requestAnimationFrame(() => {
    const el = document.querySelector(
      '.item-name-input[data-shop-idx="' + nextIdx + '"]'
    );
    if (el) el.focus();
  });
}

function makeShopAddCell(currencyId) {
  const cell = document.createElement('div');
  cell.className = 'shop-cell shop-cell-add';
  const btn = document.createElement('button');
  btn.textContent = '+ 아이템 추가';
  btn.addEventListener('click', () => {
    state.shopItems.push({ currencyId, name: '', price: 0, buyCount: 0 });
    afterEdit();
  });
  cell.appendChild(btn);
  return cell;
}

// --- 셀 / 인풋 헬퍼 ---
function makeTextInput(value, onCommit, placeholder) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = value ?? '';
  if (placeholder) input.placeholder = placeholder;
  input.addEventListener('input', () => onCommit(input.value, input));
  return input;
}

function makeNumInput(value, onCommit, opts = {}) {
  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.value = value ?? (opts.emptyValue ?? 0);
  if (opts.readonly) input.readOnly = true;
  input.addEventListener('blur', () => {
    const raw = input.value.trim();
    const fallback = opts.emptyValue ?? 0;
    if (raw === '') { onCommit(fallback); return; }
    const n = Number(raw);
    if (!Number.isFinite(n) || n < 0) { onCommit(fallback); return; }
    onCommit(n);
  });
  return input;
}

function makeTextCell(value, onCommit, placeholder) {
  const td = document.createElement('td');
  td.appendChild(makeTextInput(value, onCommit, placeholder));
  return td;
}

function makeNumCell(value, onCommit, opts = {}) {
  const td = document.createElement('td');
  td.appendChild(makeNumInput(value, onCommit, opts));
  return td;
}

function makeSumCell(value, onCommit) {
  const td = document.createElement('td');
  const input = document.createElement('input');
  input.type = 'text';
  input.inputMode = 'numeric';
  input.value = value ?? 0;
  const commit = () => {
    const n = parseSumExpr(input.value);
    input.value = n;
    onCommit(n);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      commit();
    }
  });
  td.appendChild(input);
  return td;
}

function makeDeleteCell(onClick) {
  const td = document.createElement('td');
  const btn = document.createElement('button');
  btn.className = 'btn-del';
  btn.tabIndex = -1;
  btn.textContent = '×';
  btn.title = '삭제';
  btn.addEventListener('click', onClick);
  td.appendChild(btn);
  return td;
}

function afterEdit() {
  saveState();
  render();
  recompute();
}

function afterValueEdit() {
  saveState();
  recompute();
}

function removeCurrency(id) {
  const i = state.currencies.findIndex(c => c.id === id);
  if (i < 0) return;
  state.currencies.splice(i, 1);
  state.stages.forEach(stage => { delete stage.drops[id]; });
  delete state.owned[id];
  state.shopItems = state.shopItems.filter(it => it.currencyId !== id);
  afterEdit();
}

function recompute() {
  const result = document.getElementById('result-container');
  result.innerHTML = '';

  if (!hasMinimumData(state)) {
    result.innerHTML = '<div class="result-msg">재화·스테이지 드랍·상점 아이템을 먼저 입력하세요</div>';
    return;
  }

  const model = buildModel(state);
  if (Object.keys(model.constraints).length === 0) {
    const header = document.createElement('div');
    header.className = 'result-ok';
    header.textContent = '이미 충분합니다 ✅';
    result.appendChild(header);
    renderBalanceTable(result, {});
    return;
  }

  let solved;
  try {
    // timeout is a safety net; LP-only on this problem size typically finishes
    // in well under 1 ms, so 500 ms should never actually trigger.
    solved = solver.Solve({ ...model, options: { timeout: 500 } });
  } catch (e) {
    console.error(e);
    result.innerHTML = '<div class="result-err">솔버 오류: ' + escapeHtml(e.message) + '</div>';
    return;
  }

  if (!solved.feasible) {
    result.innerHTML = '<div class="result-err">현재 입력으로는 목표 달성 불가능 (드랍이 부족하거나 모순)</div>';
    return;
  }

  // LP returns fractional runs; round up so constraints stay satisfied.
  // 1e-9 slack absorbs simplex float noise so values already at an integer
  // don't get pushed to the next one.
  for (let i = 0; i < 12; i++) {
    const k = 's' + (i + 1);
    if (solved[k]) solved[k] = Math.ceil(solved[k] - 1e-9);
  }

  renderSolvedResult(result, solved);
}

function renderSolvedResult(container, solved) {
  let totalAP = 0;
  for (let i = 0; i < 12; i++) {
    const runs = Math.round(solved['s' + (i + 1)] ?? 0);
    totalAP += runs * STAGE_AP[i];
  }

  // 권장 횟수 표
  const stageTitle = document.createElement('div');
  stageTitle.className = 'stage-rec-title';
  stageTitle.textContent = '스테이지 권장 횟수';
  container.appendChild(stageTitle);

  const activeCurrencies = state.currencies;
  const stageTable = document.createElement('table');
  stageTable.className = 'stage-rec-table';
  const stageHead = document.createElement('thead');
  const stageHeadRow = document.createElement('tr');
  stageHeadRow.innerHTML = '<th>#</th><th>AP</th><th>횟수</th>';
  activeCurrencies.forEach(c => {
    const th = document.createElement('th');
    th.textContent = '+' + currencyLabel(c);
    stageHeadRow.appendChild(th);
  });
  stageHead.appendChild(stageHeadRow);
  stageTable.appendChild(stageHead);

  const stageBody = document.createElement('tbody');
  for (let i = 0; i < 12; i++) {
    const runs = Math.round(solved['s' + (i + 1)] ?? 0);
    if (!runs) continue;
    const tr = document.createElement('tr');
    const padded = String(i + 1).padStart(2, '0');
    tr.innerHTML = `<td><span class="desktop-only">스테이지 ${i + 1}</span><span class="mobile-only">${padded}</span></td><td>${STAGE_AP[i]} ap</td><td>${runs} 번</td>`;
    activeCurrencies.forEach(c => {
      const perRun = applyBonus(state.stages[i].drops[c.id] ?? 0, c.bonus);
      const td = document.createElement('td');
      td.textContent = perRun * runs;
      tr.appendChild(td);
    });
    stageBody.appendChild(tr);
  }
  stageTable.appendChild(stageBody);
  container.appendChild(stageTable);

  const header = document.createElement('div');
  header.className = 'result-ok';
  header.textContent = '✅ 총 AP: ' + totalAP;
  container.appendChild(header);

  // 재화 수지 표
  renderBalanceTable(container, solved);
}

function renderBalanceTable(container, solved) {
  const balTitle = document.createElement('div');
  balTitle.textContent = '재화 수지';
  balTitle.style.marginTop = '12px';
  container.appendChild(balTitle);

  const balanceTable = document.createElement('table');
  balanceTable.innerHTML = '<thead><tr><th>재화</th><th>보유</th><th>필요</th><th>획득</th><th>잉여</th></tr></thead>';
  const balBody = document.createElement('tbody');
  const balance = computeBalance(state, solved);
  state.currencies.forEach(c => {
    const b = balance[c.id];
    if (!b) return;
    const tr = document.createElement('tr');
    const surplusColor = b.surplus < 0 ? 'color:#c33' : '';
    tr.innerHTML =
      `<td>${escapeHtml(currencyLabel(c))}</td>` +
      `<td>${b.owned}</td>` +
      `<td>${b.needed}</td>` +
      `<td>+${b.gained}</td>` +
      `<td style="${surplusColor}">${b.surplus >= 0 ? '+' : ''}${b.surplus}</td>`;
    balBody.appendChild(tr);
  });
  balanceTable.appendChild(balBody);
  const wrap = document.createElement('div');
  wrap.className = 'scroll-x';
  wrap.appendChild(balanceTable);
  container.appendChild(wrap);
}

function currencyLabel(c) {
  return c.name || '(이름 없음)';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function exportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'event-planner-' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJson(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (parsed && typeof parsed === 'object' && parsed.presetItems === undefined) {
        parsed.presetItems = [];
      }
      const err = validateState(parsed);
      if (err) {
        alert('유효하지 않은 파일입니다: ' + err);
        return;
      }
      normalizeCurrencyIds(parsed);
      state = parsed;
      saveState();
      render();
      recompute();
    } catch (err) {
      alert('JSON 파싱 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  document.getElementById('main-view').style.display = '';

function resetPresetEdit() {
  if (!confirm('프리셋을 기본값으로 되돌립니다. 현재 편집 중인 내용은 사라집니다. 계속할까요?')) return;
  const defaults = cloneDefaultPresetItems();
  document.getElementById('preset-textarea').value =
    defaults.map(p => JSON.stringify(p, null, 2)).join(',\n');
}

function applyPresetEdit() {
  const text = document.getElementById('preset-textarea').value.trim();
  let parsed;
  try {
    parsed = text === '' ? [] : JSON.parse('[' + text + ']');
  } catch (e) {
    alert('JSON 파싱 실패: ' + e.message);
    return;
  }
  const candidate = Object.assign({}, state, { presetItems: parsed });
  const err = validateState(candidate);
  if (err) {
    alert('유효하지 않은 프리셋: ' + err);
    return;
  }
  state.presetItems = parsed;
  saveState();
  closePresetEdit();
  render();
}

function openJsonView() {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('json-view').style.display = 'block';
  document.getElementById('json-textarea').value = JSON.stringify(state, null, 2);
}

function closeJsonView() {
  document.getElementById('main-view').style.display = '';
  document.getElementById('json-view').style.display = 'none';
}

function applyJsonView() {
  // 개발자용 편집기라 loadState/importJson 같은 하위호환 주입(presetItems 등)은 의도적으로 생략.
  // 필드를 실수로 지우면 validateState 에러로 그대로 표시한다.
  const text = document.getElementById('json-textarea').value;
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    alert('JSON 파싱 실패: ' + e.message);
    return;
  }
  const err = validateState(parsed);
  if (err) {
    alert('유효하지 않은 데이터: ' + err);
    return;
  }
  state = parsed;
  saveState();
  closeJsonView();
  render();
  recompute();
}

// 포커스가 입력 필드로 이동할 때 전체 선택. setTimeout으로 mouseup 이후에
// select()를 호출해 클릭 시 커서 위치 덮어쓰기를 회피.
document.addEventListener('focusin', e => {
  const t = e.target;
  if (!(t instanceof HTMLInputElement)) return;
  if (t.type !== 'text' && t.type !== 'number') return;
  if (t.readOnly) return;
  setTimeout(() => {
    if (document.activeElement === t) t.select();
  }, 0);
});

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-export').addEventListener('click', exportJson);
  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('file-import').click();
  });
  document.getElementById('file-import').addEventListener('change', importJson);
  document.getElementById('btn-json').addEventListener('click', openJsonView);
  document.getElementById('btn-json-apply').addEventListener('click', applyJsonView);
  document.getElementById('btn-json-cancel').addEventListener('click', closeJsonView);
  document.getElementById('btn-preset-edit').addEventListener('click', openPresetEdit);
  document.getElementById('btn-preset-apply').addEventListener('click', applyPresetEdit);
  document.getElementById('btn-preset-cancel').addEventListener('click', closePresetEdit);
  document.getElementById('btn-preset-reset').addEventListener('click', resetPresetEdit);
  render();
  recompute();
});
